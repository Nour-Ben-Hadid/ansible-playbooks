- name: Deploy app-test-7 to Azure
  hosts: localhost
  gather_facts: false
  vars:
    azure_client_id: '{{ lookup(''env'', ''AZURE_CLIENT_ID'') }}'
    azure_client_secret: '{{ lookup(''env'', ''AZURE_CLIENT_SECRET'') }}'
    azure_tenant_id: '{{ lookup(''env'', ''AZURE_TENANT_ID'') }}'
    subscription_id: '{{ lookup(''env'', ''AZURE_SUBSCRIPTION_ID'') }}'
    resource_group: grp-test-7
    app_name: app-test-7
    location: East US
    app_repo_url: https://github.com/Nour-Ben-Hadid/awx-hello-job.git
    app_repo_branch: main
    description: test num7
  tasks:
  - name: Get Azure access token
    ansible.builtin.uri:
      url: https://login.microsoftonline.com/{{ azure_tenant_id }}/oauth2/v2.0/token
      method: POST
      body_format: form-urlencoded
      body:
        grant_type: client_credentials
        client_id: '{{ azure_client_id }}'
        client_secret: '{{ azure_client_secret }}'
        scope: https://management.azure.com/.default
    register: auth_response
  - name: Set access token fact
    ansible.builtin.set_fact:
      access_token: '{{ auth_response.json.access_token }}'
  - name: Create or update Resource Group
    ansible.builtin.uri:
      url: https://management.azure.com/subscriptions/{{ subscription_id }}/resourcegroups/{{
        resource_group }}?api-version=2021-04-01
      method: PUT
      headers:
        Authorization: Bearer {{ access_token }}
        Content-Type: application/json
      body_format: json
      body:
        location: '{{ location }}'
        tags:
          Environment: Production
          CreatedBy: Ansible-Playbook
    register: rg_response
  - name: Create App Service Plan
    ansible.builtin.uri:
      url: https://management.azure.com/subscriptions/{{ subscription_id }}/resourceGroups/{{
        resource_group }}/providers/Microsoft.Web/serverfarms/{{ app_name }}-plan?api-version=2021-02-01
      method: PUT
      headers:
        Authorization: Bearer {{ access_token }}
        Content-Type: application/json
      body_format: json
      body:
        location: '{{ location }}'
        sku:
          name: F1
          tier: Free
        properties:
          name: '{{ app_name }}-plan'
    register: asp_response
  - name: Create Web App
    ansible.builtin.uri:
      url: https://management.azure.com/subscriptions/{{ subscription_id }}/resourceGroups/{{
        resource_group }}/providers/Microsoft.Web/sites/{{ app_name }}?api-version=2021-02-01
      method: PUT
      headers:
        Authorization: Bearer {{ access_token }}
        Content-Type: application/json
      body_format: json
      body:
        location: '{{ location }}'
        properties:
          serverFarmId: /subscriptions/{{ subscription_id }}/resourceGroups/{{ resource_group
            }}/providers/Microsoft.Web/serverfarms/{{ app_name }}-plan
          siteConfig:
            appSettings:
            - name: WEBSITE_NODE_DEFAULT_VERSION
              value: 18-lts
            - name: SCM_DO_BUILD_DURING_DEPLOYMENT
              value: 'true'
            - name: ENABLE_ORYX_BUILD
              value: 'true'
            - name: BUILD_FLAGS
              value: UseExpressBuild
            - name: XDT_MicrosoftApplicationInsights_NodeJS
              value: '1'
            nodeVersion: 18-lts
            linuxFxVersion: ''
            requestTracingEnabled: false
            httpLoggingEnabled: false
            logsDirectorySizeLimit: 35
            detailedErrorLoggingEnabled: false
            scmType: GitHubAction
    register: webapp_response
  - name: Configure deployment settings
    ansible.builtin.uri:
      url: https://management.azure.com/subscriptions/{{ subscription_id }}/resourceGroups/{{
        resource_group }}/providers/Microsoft.Web/sites/{{ app_name }}/config/web?api-version=2021-02-01
      method: PUT
      headers:
        Authorization: Bearer {{ access_token }}
        Content-Type: application/json
      body_format: json
      body:
        properties:
          numberOfWorkers: 1
          defaultDocuments:
          - Default.htm
          - Default.html
          - Default.asp
          - index.htm
          - index.html
          - iisstart.htm
          - default.aspx
          - index.js
          - server.js
          - app.js
          netFrameworkVersion: v4.0
          nodeVersion: 18-lts
          requestTracingEnabled: false
          httpLoggingEnabled: false
          logsDirectorySizeLimit: 35
          detailedErrorLoggingEnabled: false
          publishingUsername: ${{ app_name }}
          scmType: GitHub
          use32BitWorkerProcess: true
          webSocketsEnabled: false
          alwaysOn: false
          managedPipelineMode: Integrated
          virtualApplications:
          - virtualPath: /
            physicalPath: site\wwwroot
            preloadEnabled: false
          loadBalancing: LeastRequests
          experiments:
            rampUpRules: []
          autoHealEnabled: false
          localMySqlEnabled: false
          ipSecurityRestrictions:
          - ipAddress: Any
            action: Allow
            priority: 1
            name: Allow all
            description: Allow all access
          scmIpSecurityRestrictions:
          - ipAddress: Any
            action: Allow
            priority: 1
            name: Allow all
            description: Allow all access
          scmIpSecurityRestrictionsUseMain: false
          http20Enabled: false
          minTlsVersion: '1.2'
          ftpsState: AllAllowed
    register: webapp_config_response
  - name: Configure deployment source (GitHub)
    ansible.builtin.uri:
      url: https://management.azure.com/subscriptions/{{ subscription_id }}/resourceGroups/{{
        resource_group }}/providers/Microsoft.Web/sites/{{ app_name }}/sourcecontrols/web?api-version=2021-02-01
      method: PUT
      headers:
        Authorization: Bearer {{ access_token }}
        Content-Type: application/json
      body_format: json
      body:
        properties:
          repoUrl: '{{ app_repo_url }}'
          branch: '{{ app_repo_branch }}'
          isManualIntegration: true
          deploymentRollbackEnabled: false
          isMercurial: false
    register: deployment_response
  - name: Display deployment information
    ansible.builtin.debug:
      msg:
      - Deployment completed successfully!
      - 'App Name: {{ app_name }}'
      - 'Resource Group: {{ resource_group }}'
      - 'Location: {{ location }}'
      - 'App URL: https://{{ app_name }}.azurewebsites.net'
      - 'Repository: {{ app_repo_url }}'
      - 'Branch: {{ app_repo_branch }}'
      - 'Runtime: Node.js 18-lts'
      - 'Build System: Oryx (automatic npm install)'
      - 'Default Documents: index.js, server.js, app.js, index.html'
